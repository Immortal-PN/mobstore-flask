<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>MobStore - Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
font-family:Arial;
}

.navbar{
background:#111;
}

.navbar a{
color:white !important;
}

.search-bar{
max-width:500px;
}

.product-card{

background:white;
border-radius:10px;
padding:15px;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
height:100%;
}

.product-card:hover{

transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);

}

.product-img{

width:100%;
height:200px;
object-fit:contain;

}

.price{

font-weight:bold;
color:#27ae60;

}

.brand{

font-size:14px;
color:#777;

}

</style>

</head>
<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand text-white" href="/">MobStore</a>

<div>

<a href="/store" class="me-3">Store</a>

<a href="/cart" class="me-3">Cart</a>

{% if session.user_id %}
<a href="/logout">Logout</a>
{% else %}
<a href="/login">Login</a>
{% endif %}

</div>

</div>

</nav>


<!-- SEARCH + FILTER -->

<div class="container mt-4">

<div class="row mb-4">

<div class="col-md-6">

<form method="GET" action="/store">

<input
type="text"
name="search"
class="form-control"
placeholder="Search phones...">

</form>

</div>


<div class="col-md-3">

<form method="GET" action="/store">

<select name="brand" class="form-select" onchange="this.form.submit()">

<option value="">All Brands</option>
<option>Apple</option>
<option>Samsung</option>
<option>Xiaomi</option>
<option>OnePlus</option>
<option>Realme</option>

</select>

</form>

</div>

</div>


<!-- PRODUCT GRID -->

<div class="row">

{% for product in products %}

<div class="col-lg-3 col-md-4 col-sm-6 mb-4">

<div class="product-card">

<img src="/static/uploads/{{product[4]}}" class="product-img">

<p class="brand mt-2">{{product[1]}}</p>

<h6>{{product[2]}}</h6>

<p class="price">₹{{product[3]}}</p>

<a href="/product/{{product[0]}}" class="btn btn-outline-dark btn-sm w-100 mb-2">
View Details
</a>

<a href="/add_to_cart/{{product[0]}}" class="btn btn-dark btn-sm w-100">
Add To Cart
</a>

</div>

</div>

{% endfor %}

</div>

</div>


</body>
</html>
