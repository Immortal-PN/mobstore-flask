{% extends "base.html" %}

{% block content %}

<h1>Available Smartphones</h1>

<div class="grid">

{% for p in products %}

<div class="card">

<img src="/static/uploads/{{p[4]}}">

<h3>{{p[1]}} {{p[2]}}</h3>

<p>₹{{p[3]}}</p>

<a href="/product/{{p[0]}}">
<button>View Details</button>
</a>

</div>

{% endfor %}

</div>

{% endblock %}
