<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login - MobStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#111,#333);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.login-box{

background:white;
padding:40px;
border-radius:12px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
margin-bottom:20px;
font-weight:bold;
font-size:24px;

}

.btn-login{

background:#111;
color:white;
width:100%;

}

.btn-login:hover{

background:#333;
color:white;

}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">

MobStore

</div>

<h4 class="text-center mb-4">Login</h4>

{% if error %}
<div class="alert alert-danger">{{error}}</div>
{% endif %}

<form method="POST">

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>


<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button class="btn btn-login">Login</button>

</form>

<p class="text-center mt-3">

Don't have an account?

<a href="/register">Register</a>

</p>

</div>

</body>
</html>
