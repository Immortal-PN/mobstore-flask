{% extends "base.html" %}

{% block content %}

<h1 class="admin-title">Admin Dashboard</h1>

<div class="admin-container">

<!-- PRODUCT FORM CARD -->

<div class="admin-card">

<h2>Add New Product</h2>

<form method="POST" enctype="multipart/form-data" class="admin-form">

<div class="form-group">
<label for="brand">Brand Name</label>
<input type="text" id="brand" name="brand" placeholder="Enter brand name" required>
</div>

<div class="form-group">
<label for="model">Model Name</label>
<input type="text" id="model" name="model" placeholder="Enter model name" required>
</div>

<div class="form-group">
<label for="price">Price (₹)</label>
<input type="number" id="price" name="price" placeholder="Enter price" required>
</div>

<div class="form-group">
<label for="image">Product Image</label>
<input type="file" id="image" name="image" required>
</div>

<button type="submit">Add Product</button>

</form>

</div>

<!-- PRODUCT TABLE CARD -->

<div class="admin-card">

<h2>Available Products</h2>

<table class="admin-table">

<tr>
<th>ID</th>
<th>Brand</th>
<th>Model</th>
<th>Price</th>
<th>Image</th>
<th>Actions</th>
</tr>

{% for p in products %}

<tr>

<td>{{p[0]}}</td>

<td>{{p[1]}}</td>

<td>{{p[2]}}</td>

<td>₹{{p[3]}}</td>

<td>
<img src="/static/uploads/{{p[4]}}" class="table-img">
</td>

<td>

<a href="/edit_product/{{p[0]}}">
<button>Edit</button>
</a>

<a href="/delete_product/{{p[0]}}">
<button style="background:#ff4b5c;">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
