<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Register - MobStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#111,#333);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.register-box{

background:white;
padding:40px;
border-radius:12px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
margin-bottom:20px;
font-weight:bold;
font-size:24px;

}

.btn-register{

background:#111;
color:white;
width:100%;

}

.btn-register:hover{

background:#333;
color:white;

}

</style>

</head>
<body>

<div class="register-box">

<div class="logo">

MobStore

</div>

<h4 class="text-center mb-4">Create Account</h4>

<form method="POST">

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button class="btn btn-register">

Create Account

</button>

</form>

<p class="text-center mt-3">

Already have an account?

<a href="/login">Login</a>

</p>

</div>

</body>
</html>
