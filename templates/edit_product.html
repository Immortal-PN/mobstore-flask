{% extends "base.html" %}

{% block content %}

<h1>Edit Product</h1>

<div class="admin-card">

<form method="POST" class="admin-form">

<div class="form-group">
<label>Brand</label>
<input type="text" name="brand" value="{{product[1]}}">
</div>

<div class="form-group">
<label>Model</label>
<input type="text" name="model" value="{{product[2]}}">
</div>

<div class="form-group">
<label>Price</label>
<input type="number" name="price" value="{{product[3]}}">
</div>

<button type="submit">Update Product</button>

</form>

</div>

{% endblock %}
