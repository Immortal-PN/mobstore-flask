<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Admin Login - MobStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
font-family:Arial;
}

.navbar{
background:#111;
}

.navbar a{
color:white !important;
}

.admin-box{

background:white;
padding:40px;
border-radius:12px;
max-width:420px;
margin:auto;
margin-top:100px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);

}

.logo{

font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:10px;

}

.admin-title{

text-align:center;
margin-bottom:25px;
color:#555;

}

.btn-admin{

background:#111;
color:white;
width:100%;

}

.btn-admin:hover{

background:#333;
color:white;

}

</style>

</head>
<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand text-white" href="/">MobStore</a>

<div>

<a href="/store" class="me-3">Store</a>
<a href="/login">User Login</a>

</div>

</div>

</nav>



<div class="container">

<div class="admin-box">

<div class="logo">
MobStore
</div>

<h5 class="admin-title">Admin Panel Login</h5>

{% if error %}
<div class="alert alert-danger">
{{error}}
</div>
{% endif %}

<form method="POST">

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Admin Username"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button class="btn btn-admin">

Login

</button>

</form>

<p class="text-center mt-3 text-muted">

MobStore Admin System

</p>

</div>

</div>

</body>
</html>
